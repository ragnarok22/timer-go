name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build release assets
        run: |
          set -eu

          mkdir -p dist

          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            asset="timer_${os}_${arch}"

            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${asset}/timer" .
            tar -C "dist/${asset}" -czf "dist/${asset}.tar.gz" timer
          done

          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          set -eu

          prev_tag=$(git tag --sort=-v:refname | sed -n '2p')
          tag=${GITHUB_REF#refs/tags/}

          {
            echo "changelog<<CHANGELOG_EOF"
            if [ "$prev_tag" != "$tag" ] && [ -n "$prev_tag" ]; then
              echo "## What's Changed"
              echo ""
              git log --pretty=format:"- %s (%h)" "${prev_tag}..${tag}"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${tag}"
            else
              echo "## Initial Release"
              echo ""
              git log --pretty=format:"- %s (%h)" "${tag}"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/timer_darwin_amd64.tar.gz
            dist/timer_darwin_arm64.tar.gz
            dist/timer_linux_amd64.tar.gz
            dist/timer_linux_arm64.tar.gz
            dist/checksums.txt

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Calculate SHA256 of source tarball
        id: hash
        run: |
          set -eu

          tag=${GITHUB_REF#refs/tags/}
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${tag}.tar.gz"
          sha256=$(curl -fsSL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -eu

          tag=${GITHUB_REF#refs/tags/}
          repo="${{ github.repository }}"
          owner="${{ github.repository_owner }}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${owner}/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/timer.rb <<FORMULA
          class Timer < Formula
            desc "Terminal countdown timer with a large seven-segment display"
            homepage "https://github.com/${repo}"
            url "https://github.com/${repo}/archive/refs/tags/${tag}.tar.gz"
            sha256 "${{ steps.hash.outputs.sha256 }}"
            license :cannot_represent

            head "https://github.com/${repo}.git", branch: "main"

            depends_on "go" => :build

            def install
              system "go", "build", "-trimpath", "-o", bin/"timer", "."
            end

            test do
              assert_match "Usage: timer", shell_output("#{bin}/timer --help")
            end
          end
          FORMULA

          ruby -pi -e 'gsub(/^          /, "")' Formula/timer.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/timer.rb

          if git diff --cached --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi

          git commit -m "Update timer to ${tag}"
          git push origin main
